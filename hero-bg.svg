<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1920" y2="1080" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0C1D3D"/>
      <stop offset="0.5" stop-color="#15366E"/>
      <stop offset="1" stop-color="#0A1A36"/>
    </linearGradient>
    <linearGradient id="glow" x1="480" y1="180" x2="1680" y2="920" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D3AE69" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#D3AE69" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="1040" y1="590" x2="1890" y2="250" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E3C07D" stop-opacity="0.2"/>
      <stop offset="0.6" stop-color="#F4D79E" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#FFE3B0"/>
    </linearGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <ellipse cx="1460" cy="280" rx="470" ry="310" fill="url(#glow)"/>

  <!-- city silhouette -->
  <g opacity="0.9">
    <rect x="860" y="400" width="86" height="470" fill="#10274F"/>
    <rect x="956" y="330" width="72" height="540" fill="#14315F"/>
    <rect x="1038" y="450" width="120" height="420" fill="#11305B"/>
    <rect x="1170" y="290" width="110" height="580" fill="#173A70"/>
    <rect x="1290" y="380" width="140" height="490" fill="#14325F"/>
    <rect x="1445" y="240" width="120" height="630" fill="#1A427B"/>
    <rect x="1575" y="350" width="95" height="520" fill="#163766"/>
    <rect x="1680" y="420" width="70" height="450" fill="#10284F"/>
  </g>

  <!-- reflections -->
  <g opacity="0.28" stroke="#91ABD9" stroke-width="2">
    <line x1="900" y1="450" x2="900" y2="870"/>
    <line x1="986" y1="360" x2="986" y2="870"/>
    <line x1="1120" y1="470" x2="1120" y2="870"/>
    <line x1="1224" y1="315" x2="1224" y2="870"/>
    <line x1="1360" y1="410" x2="1360" y2="870"/>
    <line x1="1506" y1="268" x2="1506" y2="870"/>
    <line x1="1618" y1="372" x2="1618" y2="870"/>
  </g>

  <!-- growth line -->
  <polyline points="1040,590 1160,560 1260,545 1360,500 1480,468 1600,410 1730,335 1860,255"
            fill="none" stroke="url(#lineGrad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="1860" cy="255" r="12" fill="#FFE2AD"/>

  <!-- subtle grid -->
  <g opacity="0.1" stroke="#B5C8EA" stroke-width="1">
    <line x1="800" y1="220" x2="1920" y2="220"/>
    <line x1="800" y1="360" x2="1920" y2="360"/>
    <line x1="800" y1="500" x2="1920" y2="500"/>
    <line x1="800" y1="640" x2="1920" y2="640"/>
    <line x1="800" y1="780" x2="1920" y2="780"/>
    <line x1="920" y1="140" x2="920" y2="920"/>
    <line x1="1080" y1="140" x2="1080" y2="920"/>
    <line x1="1240" y1="140" x2="1240" y2="920"/>
    <line x1="1400" y1="140" x2="1400" y2="920"/>
    <line x1="1560" y1="140" x2="1560" y2="920"/>
    <line x1="1720" y1="140" x2="1720" y2="920"/>
  </g>
</svg>
